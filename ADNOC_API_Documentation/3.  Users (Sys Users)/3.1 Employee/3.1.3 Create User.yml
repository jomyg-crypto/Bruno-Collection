info:
  name: 3.1.3 Create User
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/users"
  body:
    type: json
    data: |-
      {
        "FK_AppID": 1,
        "FK_UserUniqueID": 1001,
        "FK_RoleID": 2,
        "Username": "john_doe",
        "Email": "john.doe@example.com",
        "Password": "hashed_password_here",
        "IsActive": true,
        "LastLoginIP": "192.168.1.1",
        "Remarks": "Test user",
        "CreatedBy": "admin"
      }
  auth:
    type: bearer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
