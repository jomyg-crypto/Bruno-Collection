info:
  name: 3.1.1 Get Users
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/users"
  body:
    type: json
    data: |-
      {
        "filters": {
          "username": "amal",
          "email": "amal@example.com",
          "isActive": true,
          "roleId": 2,
          "lastLoginFrom": "2025-01-01",
          "lastLoginTo": "2025-12-31"
        },
        "pagination": {
          "pageNo": 1,
          "limit": 50
        },
        "sort": {
          "field": "CreatedOn",
          "order": "desc"
        }
      }
  auth:
    type: bearer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
