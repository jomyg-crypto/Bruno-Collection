info:
  name: 3.4.3 Create Company
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/group-companies"
  body:
    type: json
    data: |-
      {
        "companyName": "Tech Solutions",
        "isActive": true,
        "createdBy": "admin_user"
      }
  auth:
    type: bearer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
