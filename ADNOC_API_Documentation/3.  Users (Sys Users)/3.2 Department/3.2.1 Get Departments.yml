info:
  name: 3.2.1 Get Departments
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/departments"
  body:
    type: json
    data: |-
      {
        "filters": {
          "departmentName": "HR",
          "isActive": true,
          "createdFrom": "2025-01-01",
          "createdTo": "2025-12-31"
        },
        "pagination": {
          "pageNo": 1,
          "limit": 20
        },
        "sort": {
          "field": "CreatedOn",
          "order": "desc"
        }
      }
  auth:
    type: bearer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
