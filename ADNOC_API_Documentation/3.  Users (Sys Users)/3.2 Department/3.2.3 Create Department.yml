info:
  name: 3.2.3 Create Department
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/departments"
  body:
    type: json
    data: |-
      {
        "departmentName": "Human Resources",
        "isActive": true,
        "createdBy": "admin_user"
      }
  auth:
    type: bearer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
