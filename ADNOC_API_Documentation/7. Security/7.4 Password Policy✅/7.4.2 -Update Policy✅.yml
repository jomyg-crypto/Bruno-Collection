  body:
    type: json
    data: "{\r

      \            \"pwdPolicyID\": 1,\r

      \            \"minimumPWdLength\": 5,\r

      \            \"requirdUppercaseLetter\": true,\r

      \            \"requiredLowercaseLetter\": true,\r

      \            \"requeirdOneNumber\": true,\r

      \            \"requiredSymbolCharacter\": false,\r

      \            \"passwordExpiryDays\": 30,\r

      \            \"enforcePwdHistory\": true\r

      }"
