info:
  name: 5.4.1 Get History
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/email-history"
  body:
    type: json
    data: |-
      {
          "filters": {
              "QUERY": ""
          },
          "pagination": {
              "pageNo": 1,
              "limit": 15
          },
         "sort": {
          "field": "CreatedOn",
          "order": "desc"
        }
      }
  auth:
    type: bearer
    token: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
