info:
  name: 5.7.1 Get Templates
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/web-notification-templates"
  body:
    type: json
    data: |-
      {
        "filters": {
          "appId": 1,
          "templateCode": "USER_ALERT",
          "subject": "Alert",
          "isEnabled": 1,
          "createdBy": "admin",
          "createdFrom": "2025-01-01",
          "createdTo": "2025-12-31"
        },
        "pagination": {
          "pageNo": 1,
          "limit": 20
        },
        "sort": {
          "field": "CreatedOn",
          "order": "desc"
        }
      }
  auth:
    type: bearer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
